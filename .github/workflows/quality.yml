name: quality

on:
  push:
    branches:
      - '**'
  pull_request:
  merge_group:

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v6
        with:
          version: 11.7.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.97.0
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
      - name: Install Tauri Linux prerequisites
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - run: pnpm install --frozen-lockfile
      - run: pnpm run quality
      - run: pnpm run lint:rust
      - run: pnpm run test:rust

  macos-rust:
    name: macOS Rust warnings
    runs-on: macos-15
    env:
      RUSTFLAGS: -D warnings
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 11.7.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.97.0
          targets: aarch64-apple-darwin,x86_64-apple-darwin
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          shared-key: release-macos-universal
          key: ${{ github.sha }}
          cache-workspace-crates: true
      - run: pnpm install --frozen-lockfile
      - if: github.event_name != 'push' || github.ref != 'refs/heads/master'
        run: pnpm run build
      - name: Check macOS Rust with warnings denied
        if: github.event_name != 'push' || github.ref != 'refs/heads/master'
        run: >-
          cargo check
          --manifest-path src-tauri/Cargo.toml
          --target aarch64-apple-darwin
      - name: Prebuild macOS universal Tauri application
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: >-
          pnpm tauri build
          --no-bundle
          --target universal-apple-darwin
          --config tauri.release.json

  windows-release-cache:
    name: Prebuild Windows release target
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: windows-2025
    env:
      RUSTFLAGS: -D warnings
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 11.7.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.97.0
          targets: x86_64-pc-windows-msvc
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          shared-key: release-windows-x64
          key: ${{ github.sha }}
          cache-workspace-crates: true
      - run: pnpm install --frozen-lockfile
      - run: >-
          pnpm tauri build
          --no-bundle
          --target x86_64-pc-windows-msvc
          --config tauri.release.json
